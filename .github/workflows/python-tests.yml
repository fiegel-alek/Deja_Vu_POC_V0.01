name: Python policy tests

on:
  push:
    branches: ["dev", "test", "main"]
  pull_request:

jobs:
  unittest:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Run sample scenario
        run: python scripts/run_scenario.py scenarios/weapon_cooldown.json

      - name: Validate example dataset manifest
        run: python scripts/validate_dataset.py data/dataset.example.json
